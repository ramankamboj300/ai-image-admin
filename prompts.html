}

.toast {
  position: fixed; 
  bottom: 24px; 
  left: 50%; 
  transform: translateX(-50%) translateY(100px);
  background: rgba(17, 24, 39, 0.9);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(139, 92, 246, 0.3);

  pointer-events: none;
}
.toast.show { 
  transform: translateX(-50%) translateY(0);

let currentSort = 'popular';
let visibleCount = 12;

// Render Grid Cards
function renderCards() {
  const grid = document.getElementById('promptGrid');
  let sorted = [...prompts];
  
  if (currentSort === 'popular') {
    sorted.sort((a,b) => b.likes - a.likes);
  } else if (currentSort === 'trending') {
    sorted.sort((a,b) => b.likes * Math.random() - a.likes * Math.random());
  } else if (currentSort === 'latest') {
    sorted.sort((a,b) => new Date(b.date) - new Date(a.date));
  }

  const visible = sorted.slice(0, visibleCount);
  grid.innerHTML = visible.map((p, i) => `
    <div class="card-3d rounded-3xl overflow-hidden group flex flex-col h-full border border-white/5 transition-all duration-300">
      <!-- Card Image -->
      <div class="relative aspect-[4/5] w-full overflow-hidden bg-gray-900">
        <img alt="${p.title}" loading="lazy" class="object-cover img-zoom w-full h-full" src="${p.img}"/>
        <span class="absolute top-4 left-4 rounded-xl border border-white/10 bg-black/60 backdrop-blur-md px-3 py-1.5 text-[0.7rem] font-bold tracking-wider uppercase text-white">${p.category}</span>
        <div class="absolute top-4 right-4 rounded-xl border border-white/10 bg-black/60 backdrop-blur-md px-3 py-1.5 text-[0.75rem] font-bold text-yellow-400 flex items-center gap-1">
          <span>★</span> ${p.likes}
        </div>
      </div>
      <!-- Card Content -->
      <div class="p-5 flex flex-col flex-1">
        <h3 class="text-lg font-bold text-white mb-2 line-clamp-1">${p.title}</h3>
        <p class="text-xs text-gray-400 line-clamp-3 mb-5 leading-relaxed flex-1">${p.desc}</p>
        
        <!-- Action Buttons -->
        <div class="flex items-center gap-2">
          <button class="flex-1 bg-gradient-to-r from-violet-600 to-indigo-600 text-white font-bold text-xs py-3 px-4 rounded-xl active:scale-[0.97] transition-all duration-200 flex items-center justify-center gap-1.5 shadow-md shadow-violet-900/10 hover:shadow-violet-600/30" onclick="copyPrompt('${p.desc}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            <span>Copy Prompt</span>
          </button>
        </div>
      </div>
    </div>
  `).join('');

  document.getElementById('loadMoreBtn').style.display = visibleCount >= prompts.length ? 'none' : 'block';
}

// Copy Action
function copyPrompt(desc) {
  navigator.clipboard.writeText(desc).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  });
}

// Tab sorting
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.remove('tab-active');
      b.classList.add('tab-inactive');
    });
    btn.classList.add('tab-active');
    btn.classList.remove('tab-inactive');
    currentSort = btn.dataset.sort;
    visibleCount = 12;
    renderCards();
  });
});

// Load more
document.getElementById('loadMoreBtn').addEventListener('click', () => {
  visibleCount += 12;
  renderCards();
});

// Initial Render
renderCards();
</script>
